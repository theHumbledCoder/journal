name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Convert any .docx files in content/ to Markdown automatically
      - name: Convert Word docs to Markdown
        run: |
          if find content -name "*.docx" 2>/dev/null | grep -q .; then
            sudo apt-get install -y pandoc
            find content -name "*.docx" | while read f; do
              out="${f%.docx}.md"
              echo "Converting $f → $out"
              pandoc "$f" -o "$out"
            done
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # cname: your-domain.com   # uncomment and set your custom domain
